# 오를지 프론트엔드 (Next.js)
app = "bbauction"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_GATE_URL = "/gate"
  NEXT_PUBLIC_NAVER_MAP_CLIENT_ID = "iw0zb5e7nf"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[vm]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
