<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clear Service Worker - 오를지</title>
    <style>body{font-family:Inter,system-ui,Arial;margin:24px;color:#111}button{padding:10px 14px;border-radius:8px;border:1px solid #ddd;background:#f5f7fb;cursor:pointer}pre{background:#f8f9fb;padding:12px;border-radius:6px;white-space:pre-wrap}</style>
  </head>
  <body>
    <h3>Service Worker & Cache 클리어</h3>
    <p>아래 버튼을 클릭하면 이 사이트의 Service Worker, Cache, IndexedDB, LocalStorage를 삭제합니다.</p>
    <button id="run">Unregister & Clear (권장: 새 탭에서 실행)</button>
    <button id="reload" style="margin-left:8px">강제 새로고침</button>
    <h4>결과</h4>
    <pre id="out">대기 중...</pre>

    <script>
      async function runClear(){
        const out = [];
        try{
          if('serviceWorker' in navigator){
            const regs = await navigator.serviceWorker.getRegistrations();
            if(regs.length===0) out.push('ServiceWorker 없음');
            for(const r of regs){
              const ok = await r.unregister();
              out.push('Unregistered: ' + (r.scope||'(no-scope)') + ' -> ' + ok);
            }
          } else out.push('ServiceWorker 미지원');
        }catch(e){ out.push('SW error: ' + e.message) }

        try{
          if('caches' in window){
            const keys = await caches.keys();
            if(keys.length===0) out.push('Cache 없음');
            for(const k of keys){
              const ok = await caches.delete(k);
              out.push('Deleted cache: ' + k + ' -> ' + ok);
            }
          } else out.push('Cache API 미지원');
        }catch(e){ out.push('Cache error: ' + e.message) }

        try{ localStorage.clear(); out.push('localStorage cleared'); }catch(e){ out.push('localStorage error: ' + e.message) }

        try{
          if(indexedDB && indexedDB.databases){
            const dbs = await indexedDB.databases();
            if(dbs.length===0) out.push('IndexedDB 없음');
            for(const db of dbs){
              if(db && db.name){
                try{ indexedDB.deleteDatabase(db.name); out.push('Deleted IndexedDB: ' + db.name); }catch(e){ out.push('IndexedDB del err: '+e.message) }
              }
            }
          } else out.push('indexedDB.databases 미지원');
        }catch(e){ out.push('IndexedDB error: ' + e.message) }

        document.getElementById('out').textContent = out.join('\n');
      }
      document.getElementById('run').addEventListener('click', runClear);
      document.getElementById('reload').addEventListener('click', ()=> location.reload(true));
    </script>
  </body>
</html>
